name: CI/CD

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent
          DB_PATH: ./test.db

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ingest sample data
        run: npx ts-node src/index.ts ingest ./data/sample.tsv
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Check stats
        run: |
          OUTPUT=$(npx ts-node src/index.ts stats)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '"totalQuestions"'
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Ask a question
        run: |
          OUTPUT=$(npx ts-node src/index.ts ask "Give me hard science questions" 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "MOCK MODE"
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Server smoke test
        run: |
          npx ts-node src/index.ts serve --port 3333 &
          sleep 3
          curl -sf http://localhost:3333/stats | grep -q totalQuestions
          curl -sf -X POST http://localhost:3333/ask \
            -H "Content-Type: application/json" \
            -d '{"question":"science questions"}' | grep -q answer
          curl -sf http://localhost:3333/registry?limit=5 | grep -q category
          curl -sf "http://localhost:3333/export?categories=SCIENCE" | grep -q category
          curl -sf http://localhost:3333/ | grep -q "JEOPARDY RAG"
          kill %1 || true
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

  deploy:
    runs-on: ubuntu-latest
    needs: [test, smoke]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          envs: ANTHROPIC_API_KEY
          script_stop: true
          script: |
            set -e
            cd /opt/app

            echo "=== Pulling latest code ==="
            git fetch origin
            git checkout ${{ github.sha }}

            echo "=== Building Docker image ==="
            docker build -t jeopardy-rag:${{ github.sha }} -t jeopardy-rag:latest .

            echo "=== Stopping old container ==="
            docker stop jeopardy-rag || true
            docker rm jeopardy-rag || true

            echo "=== Starting new container ==="
            docker run -d \
              --name jeopardy-rag \
              --restart unless-stopped \
              -p 80:3000 \
              -v /data:/data \
              -v /opt/app/data:/app/data:ro \
              -e DB_PATH=/data/jeopardy.db \
              -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY:-}" \
              jeopardy-rag:latest

            echo "=== Waiting for health check ==="
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/stats > /dev/null 2>&1; then
                echo "Health check passed!"
                break
              fi
              echo "Attempt $i failed, waiting..."
              sleep 3
            done

            # Final check — if unhealthy, rollback
            if ! curl -sf http://localhost/stats > /dev/null 2>&1; then
              echo "=== DEPLOY FAILED — rolling back ==="
              docker stop jeopardy-rag || true
              docker rm jeopardy-rag || true
              PREV=$(docker images --format '{{.Tag}}' jeopardy-rag | grep -v latest | head -1)
              if [ -n "$PREV" ]; then
                docker run -d \
                  --name jeopardy-rag \
                  --restart unless-stopped \
                  -p 80:3000 \
                  -v /data:/data \
                  -v /opt/app/data:/app/data:ro \
                  -e DB_PATH=/data/jeopardy.db \
                  jeopardy-rag:$PREV
              fi
              exit 1
            fi

            echo "=== Cleaning old images ==="
            docker image prune -f

            echo "=== Deploy complete ==="
