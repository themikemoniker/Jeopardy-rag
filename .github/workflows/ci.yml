name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent
          DB_PATH: ./test.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ingest sample data
        run: npx ts-node src/index.ts ingest ./data/sample.tsv
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Check stats
        run: |
          OUTPUT=$(npx ts-node src/index.ts stats)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '"totalQuestions"'
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Ask a question
        run: |
          OUTPUT=$(npx ts-node src/index.ts ask "Give me hard science questions" 2>/dev/null)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "MOCK MODE"
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent

      - name: Server smoke test
        run: |
          npx ts-node src/index.ts serve --port 3333 &
          sleep 3

          # Test /stats
          curl -sf http://localhost:3333/stats | grep -q totalQuestions

          # Test /ask
          curl -sf -X POST http://localhost:3333/ask \
            -H "Content-Type: application/json" \
            -d '{"question":"science questions"}' | grep -q answer

          # Test /registry
          curl -sf http://localhost:3333/registry?limit=5 | grep -q category

          # Test /export
          curl -sf "http://localhost:3333/export?categories=SCIENCE" | grep -q category

          # Test web UI
          curl -sf http://localhost:3333/ | grep -q "JEOPARDY RAG"

          kill %1 || true
        env:
          MOCK_MODE: "true"
          LOG_LEVEL: silent
